<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品情感分析评估报告</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header .sub { opacity: 0.9; font-size: 1.1em; }
        .content { padding: 40px; }
        .section { margin-bottom: 40px; }
        .section-title {
            font-size: 1.5em;
            color: #333;
            border-left: 5px solid #667eea;
            padding-left: 15px;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .info-card {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #e9ecef;
        }
        .info-card .label {
            color: #6c757d;
            font-size: 0.9em;
            margin-bottom: 8px;
        }
        .info-card .value {
            font-size: 1.8em;
            font-weight: 700;
            color: #333;
        }
        .positive { color: #28a745 !important; }
        .negative { color: #dc3545 !important; }
        .neutral { color: #ffc107 !important; }
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }
        .chart-card {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #e9ecef;
        }
        .chart-card h3 { margin-bottom: 15px; color: #495057; font-size: 1.1em; }
        .chart-container { height: 300px; position: relative; }
        .metrics-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .metrics-table th, .metrics-table td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #e9ecef;
        }
        .metrics-table th {
            background: #667eea;
            color: white;
            font-weight: 600;
        }
        .metrics-table tr:hover { background: #f8f9fa; }
        .advice-box {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            padding: 30px;
            border-radius: 12px;
            border-left: 5px solid #ff6b6b;
        }
        .advice-box h3 { color: #333; margin-bottom: 15px; font-size: 1.2em; }
        .advice-box p { line-height: 1.8; color: #555; white-space: pre-wrap; }
        .summary-box {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            padding: 30px;
            border-radius: 12px;
            border-left: 5px solid #4ecdc4;
            margin-bottom: 20px;
        }
        .summary-box p { line-height: 1.8; color: #333; font-size: 1.1em; }
        .comments-list {
            max-height: 400px;
            overflow-y: auto;
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
        }
        .comment-item {
            padding: 15px;
            background: white;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #e9ecef;
        }
        .comment-item .tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.8em;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .tag-positive { background: #d4edda; color: #155724; }
        .tag-negative { background: #f8d7da; color: #721c24; }
        .tag-neutral { background: #fff3cd; color: #856404; }
        .back-btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .back-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102,126,234,0.4); }
        .loading {
            text-align: center;
            padding: 60px;
            color: #666;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .actions {
            text-align: center;
            margin-top: 30px;
        }
        .print-btn {
            display: inline-block;
            padding: 12px 30px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            margin-left: 10px;
            cursor: pointer;
            border: none;
            font-size: 1em;
            transition: transform 0.3s;
        }
        .print-btn:hover { transform: translateY(-2px); }
        @media print {
            body { background: white; padding: 0; }
            .container { box-shadow: none; border-radius: 0; }
            .actions { display: none; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 商品情感分析评估报告</h1>
            <div class="sub" id="reportDate">正在加载...</div>
        </div>
        <div class="content" id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p>正在加载报告数据...</p>
            </div>
        </div>
    </div>

    <script>
        const historyId = {{ history_id }};
        let sentimentChart = null;
        let metricsChart = null;

        async function loadReport() {
            try {
                const response = await fetch(`/api/analysis/report/${historyId}`);
                const data = await response.json();

                if (!data.success) {
                    showError(data.error || '加载报告失败');
                    return;
                }

                renderReport(data.report);
            } catch (e) {
                showError('网络错误: ' + e.message);
            }
        }

        function showError(message) {
            document.getElementById('content').innerHTML = `
                <div class="error">
                    <h3>❌ 加载失败</h3>
                    <p>${message}</p>
                    <div style="margin-top: 20px;">
                        <a href="/" class="back-btn">返回首页</a>
                    </div>
                </div>
            `;
        }

        function renderReport(report) {
            document.getElementById('reportDate').textContent = report.report_date;

            let html = '';

            // 基本信息
            html += `
                <div class="section">
                    <div class="section-title">📋 基本信息</div>
                    <div class="info-grid">
                        <div class="info-card">
                            <div class="label">商品名称</div>
                            <div class="value">${report.product_name || '未命名商品'}</div>
                        </div>
                        <div class="info-card">
                            <div class="label">评论总数</div>
                            <div class="value">${report.history.comment_count || 0}</div>
                        </div>
                        <div class="info-card">
                            <div class="label">数据来源</div>
                            <div class="value">${report.history.source_type || '未知'}</div>
                        </div>
                        <div class="info-card">
                            <div class="label">分析时间</div>
                            <div class="value" style="font-size: 1.1em;">${new Date(report.history.created_at).toLocaleString('zh-CN')}</div>
                        </div>
                    </div>
                </div>
            `;

            // 情感分布
            html += `
                <div class="section">
                    <div class="section-title">🎯 情感分布概览</div>
                    <div class="info-grid">
                        <div class="info-card">
                            <div class="label">😊 正面评价</div>
                            <div class="value positive">${report.sentiment_labels['2'] || 0} (${report.sentiment_percentages['2'] || 0}%)</div>
                        </div>
                        <div class="info-card">
                            <div class="label">😐 中性评价</div>
                            <div class="value neutral">${report.sentiment_labels['1'] || 0} (${report.sentiment_percentages['1'] || 0}%)</div>
                        </div>
                        <div class="info-card">
                            <div class="label">😟 负面评价</div>
                            <div class="value negative">${report.sentiment_labels['0'] || 0} (${report.sentiment_percentages['0'] || 0}%)</div>
                        </div>
                    </div>
                </div>
            `;

            // 图表
            html += `
                <div class="section">
                    <div class="section-title">📈 可视化分析</div>
                    <div class="charts-grid">
                        <div class="chart-card">
                            <h3>情感分布饼图</h3>
                            <div class="chart-container">
                                <canvas id="sentimentChart"></canvas>
                            </div>
                        </div>
                        <div class="chart-card">
                            <h3>模型性能对比</h3>
                            <div class="chart-container">
                                <canvas id="metricsChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // 评估指标
            if (report.metrics && report.metrics.length > 0) {
                html += `
                    <div class="section">
                        <div class="section-title">📊 模型评估指标</div>
                        <table class="metrics-table">
                            <thead>
                                <tr>
                                    <th>模型</th>
                                    <th>准确率</th>
                                    <th>精确率</th>
                                    <th>召回率</th>
                                    <th>F1分数</th>
                                </tr>
                            </thead>
                            <tbody>
                `;
                report.metrics.forEach(m => {
                    html += `
                        <tr>
                            <td>${m.model}</td>
                            <td>${(m.accuracy * 100).toFixed(1)}%</td>
                            <td>${(m.precision * 100).toFixed(1)}%</td>
                            <td>${(m.recall * 100).toFixed(1)}%</td>
                            <td>${(m.f1 * 100).toFixed(1)}%</td>
                        </tr>
                    `;
                });
                html += `</tbody></table></div>`;
            }

            // 智能总结
            html += `
                <div class="section">
                    <div class="section-title">💡 智能分析总结</div>
                    <div class="summary-box">
                        <p>${report.summary}</p>
                    </div>
                </div>
            `;

            // 经营建议
            html += `
                <div class="section">
                    <div class="section-title">🚀 经营建议</div>
                    <div class="advice-box">
                        <h3>📝 建议内容</h3>
                        <p>${report.advice}</p>
                    </div>
                </div>
            `;

            // 评论列表
            if (report.comments && report.comments.length > 0) {
                html += `
                    <div class="section">
                        <div class="section-title">💬 评论详情 (${report.comments.length}条)</div>
                        <div class="comments-list">
                `;
                report.comments.forEach(c => {
                    let tagClass = 'tag-neutral';
                    let tagText = '中性';
                    if (c.sentiment_label === 2) { tagClass = 'tag-positive'; tagText = '正面'; }
                    if (c.sentiment_label === 0) { tagClass = 'tag-negative'; tagText = '负面'; }
                    html += `
                        <div class="comment-item">
                            <span class="tag ${tagClass}">${tagText}</span>
                            <p style="color: #333; line-height: 1.6;">${c.content}</p>
                        </div>
                    `;
                });
                html += `</div></div>`;
            }

            // 操作按钮
            html += `
                <div class="actions">
                    <a href="/" class="back-btn">← 返回首页</a>
                    <button class="print-btn" onclick="window.print()">🖨️ 打印报告</button>
                </div>
            `;

            document.getElementById('content').innerHTML = html;

            // 渲染图表
            renderCharts(report);
        }

        function renderCharts(report) {
            // 情感分布饼图
            const ctx1 = document.getElementById('sentimentChart').getContext('2d');
            sentimentChart = new Chart(ctx1, {
                type: 'pie',
                data: {
                    labels: ['负面', '中性', '正面'],
                    datasets: [{
                        data: [
                            report.sentiment_labels['0'] || 0,
                            report.sentiment_labels['1'] || 0,
                            report.sentiment_labels['2'] || 0
                        ],
                        backgroundColor: ['#dc3545', '#ffc107', '#28a745'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });

            // 模型性能柱状图
            const ctx2 = document.getElementById('metricsChart').getContext('2d');
            const models = (report.metrics || []).map(m => m.model);
            if (models.length > 0) {
                metricsChart = new Chart(ctx2, {
                    type: 'bar',
                    data: {
                        labels: models,
                        datasets: [
                            { label: '准确率', data: (report.metrics || []).map(m => (m.accuracy * 100).toFixed(1)), backgroundColor: '#667eea' },
                            { label: 'F1分数', data: (report.metrics || []).map(m => (m.f1 * 100).toFixed(1)), backgroundColor: '#764ba2' }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: { beginAtZero: true, max: 100 }
                        },
                        plugins: {
                            legend: { position: 'bottom' }
                        }
                    }
                });
            }
        }

        async function downloadAsImage() {
            const container = document.querySelector('.container');
            try {
                const canvas = await html2canvas(container, {
                    scale: 2,
                    useCORS: true,
                    allowTaint: true,
                    backgroundColor: '#ffffff'
                });
                const link = document.createElement('a');
                link.download = `情感分析报告_${new Date().toLocaleDateString('zh-CN')}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (e) {
                alert('下载失败: ' + e.message);
            }
        }
        loadReport();
    </script>
</body>
</html>
